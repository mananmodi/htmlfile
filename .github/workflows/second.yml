name: Upload Artifacts Demo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:


jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------
      # STEP 1 → CHECKOUT CODE
      # ------------------------------------------------------
      - name: create a demo file
        run: |
          echo "This is a simple demo file for testing artifact upload." > demo.txt
          echo "File is created"

      - name: Upload a DEMO
        uses: actions/upload-artifact@v7
        with:
          name: demo-artifact
          path: .
  test:
    runs-on: ubuntu-latest
    needs: ci-pipeline
    steps:
      # ------------------------------------------------------
      # STEP 1 → CHECKOUT CODE
      # ------------------------------------------------------
      - name: create a demo file 1
        run: |
          echo "This is a simple demo file 1 for testing artifact upload." > demo.txt
          echo "File is created"

      - name: Upload a DEMO
        uses: actions/upload-artifact@v7
        with:
          name: demo-artifact-1
          path: .
    